<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1216" />
  <title>Horas SELGRON</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f5a623'/%3E%3Ctext x='50' y='72' font-size='64' font-family='Arial' font-weight='bold' text-anchor='middle' fill='%23241a02'%3ES%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <div class="logo">
      <div class="mark">S</div>
      <div>HORAS · SELGRON<small id="hdrsub">Fichas Mod. 012</small></div>
    </div>
    <div class="hdr-right" id="hdrRight" hidden>
      <span class="userchip" id="userChip"></span>
      <button class="btn ghost small" id="btnConfig" title="Configurações">⚙️</button>
      <button class="btn ghost small" id="btnLogout" title="Sair">Sair</button>
    </div>
  </header>

  <main>
    <!-- ============ LOGIN ============ -->
    <section class="view active" id="view-login">
      <div class="auth-card">
        <div class="mark big">S</div>
        <h2>Entrar</h2>
        <p class="sub">Use seu e-mail <b>@selgron.com.br</b>. Enviamos um link de acesso — sem senha.</p>
        <input type="email" id="loginEmail" inputmode="email" autocomplete="email" placeholder="seu.nome@selgron.com.br" />
        <button class="btn primary block" id="btnMagic">Enviar link de acesso</button>
        <p class="hint" id="loginMsg"></p>
      </div>
    </section>

    <!-- ============ ONBOARDING (perfil + assinatura) ============ -->
    <section class="view" id="view-onboarding">
      <h2 class="section-title">Seu cadastro</h2>
      <p class="sub">Só na primeira vez. Depois é só preencher e enviar.</p>
      <div class="panel">
        <div class="field"><label>Nome completo</label><input id="obNome" placeholder="NOME COMPLETO" /></div>
        <div class="row2">
          <div class="field"><label>Matrícula</label><input id="obMat" inputmode="numeric" placeholder="Ex.: 00966" /></div>
          <div class="field"><label>Seção</label><input id="obSecao" value="SUPRIMENTOS" /></div>
        </div>
        <div class="field">
          <label>Sua assinatura <span class="mut">— desenhe com o dedo/mouse</span></label>
          <div class="sigpad-wrap">
            <canvas id="obSig" class="sigpad"></canvas>
            <button type="button" class="btn ghost small sigclear" data-clear="obSig">Limpar</button>
          </div>
          <div class="hint">Ou <label class="linklike">envie um PNG<input type="file" id="obSigFile" accept="image/png,image/jpeg" hidden></label>.</div>
        </div>
        <button class="btn primary block" id="btnSaveProfile">Salvar cadastro</button>
      </div>
    </section>

    <!-- ============ COLABORADOR ============ -->
    <section class="view" id="view-colab">
      <div class="subtabs" data-group="colab">
        <button class="subtab active" data-sub="nova">Nova ficha</button>
        <button class="subtab" data-sub="minhas">Minhas fichas</button>
      </div>

      <div class="subview active" id="colab-nova">
        <div class="panel form-ficha" id="formFicha"></div>
      </div>

      <div class="subview" id="colab-minhas">
        <div id="minhasFichas" class="lista"></div>
      </div>
    </section>

    <!-- ============ GESTOR ============ -->
    <section class="view" id="view-gestor">
      <div class="subtabs" data-group="gestor">
        <button class="subtab active" data-sub="inbox">Caixa de entrada <span class="count" id="inboxCount"></span></button>
        <button class="subtab" data-sub="assinadas">Assinadas</button>
        <button class="subtab" data-sub="painel">Painel</button>
      </div>
      <div class="subview active" id="gestor-inbox"><div id="inboxLista" class="lista"></div></div>
      <div class="subview" id="gestor-assinadas"><div id="assinadasLista" class="lista"></div></div>
      <div class="subview" id="gestor-painel">
        <div class="kpis" id="kpis"></div>
        <div class="panel"><h3>Horas por colaborador</h3><div class="bars" id="barsPessoa"></div></div>
        <div class="filters">
          <input type="text" id="fSearch" placeholder="🔎 Buscar…" />
          <button class="btn small" id="btnCsv">⬇️ CSV</button>
        </div>
        <div class="table-wrap"><table id="tbl"><thead><tr>
          <th>Data</th><th>Colaborador</th><th>Tipo</th><th>Entr.</th><th>Saída</th><th>Horas</th><th>Status</th>
        </tr></thead><tbody id="tblBody"></tbody></table></div>
      </div>
    </section>

    <!-- ============ CONFIG ============ -->
    <section class="view" id="view-config">
      <h2 class="section-title">Configurações</h2>
      <div class="panel">
        <h3>Meu perfil</h3>
        <div class="field"><label>Nome</label><input id="cfNome" /></div>
        <div class="row2">
          <div class="field"><label>Matrícula</label><input id="cfMat" /></div>
          <div class="field"><label>Seção</label><input id="cfSecao" /></div>
        </div>
        <div class="field">
          <label>Assinatura</label>
          <div class="sigpad-wrap">
            <canvas id="cfSig" class="sigpad"></canvas>
            <button type="button" class="btn ghost small sigclear" data-clear="cfSig">Limpar</button>
          </div>
          <div class="hint">Ou <label class="linklike">envie um PNG<input type="file" id="cfSigFile" accept="image/png,image/jpeg" hidden></label>.</div>
        </div>
        <button class="btn primary" id="btnSaveConfig">Salvar</button>
        <button class="btn ghost" id="btnBack">Voltar</button>
      </div>
    </section>
  </main>

  <div class="toast-wrap" id="toasts"></div>

  <script src="vendor/pdf-lib.min.js"></script>
  <script src="vendor/supabase.js"></script>
  <script src="assets/modelo-ficha.js"></script>
  <script src="ficha-pdf.js"></script>
  <script src="app.js"></script>
</body>
</html>
